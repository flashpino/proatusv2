# mosquitto.conf — CPD Monitor
#
# Produção: devices conectam APENAS via TLS (8883).
# O listener 1883 fica restrito à rede interna do EasyPanel (backend → broker
# na mesma rede Docker não precisa de TLS; o tráfego não sai do host).
#
# Certificados: use um domínio (ex.: mqtt.seudominio.com.br) apontando para o
# servidor e emita via Let's Encrypt (certbot). Monte os arquivos no container
# em /mosquitto/certs/. Renovação: certbot renew + restart do container (cron).

# ── Listener interno (backend, rede Docker) ──────────────────
listener 1883
protocol mqtt

# ── Listener TLS (devices na internet) ───────────────────────
listener 8883
protocol mqtt
cafile   /mosquitto/certs/chain1.pem
certfile /mosquitto/certs/cert1.pem
keyfile  /mosquitto/certs/privkey1.pem
tls_version tlsv1.2

# ── Listener WebSocket (se usado pelo painel) ────────────────
listener 9001
protocol websockets

# ── Segurança ────────────────────────────────────────────────
allow_anonymous false
password_file /mosquitto/config/passwd

# ACL por usuário: cada device só publica/assina nos próprios tópicos.
# Um token vazado não permite forjar dados de outros devices.
acl_file /mosquitto/config/acl

# ── Persistência ─────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
autosave_interval 300

# ── Logs ─────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_timestamp true

# ── Limites (frota grande) ───────────────────────────────────
# -1 = sem limite imposto pelo Mosquitto (o SO limita por file descriptors)
max_connections -1
max_inflight_messages 20
# Fila por sessão persistente desconectada (ex.: backend em deploy):
max_queued_messages 1000
