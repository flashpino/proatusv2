# mosquitto.conf — CPD Monitor

# Listener TCP
listener 1883
protocol mqtt

# Listener WebSocket
listener 9001
protocol websockets

# Segurança
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistência
persistence true
persistence_location /mosquitto/data/

# Logs
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# Limites
max_connections 200
max_inflight_messages 20
max_queued_messages 100
keepalive_interval 60